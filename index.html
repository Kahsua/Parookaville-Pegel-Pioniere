<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Parookaville · Promille-Bestenliste</title>
<style>
  :root{
    --bg:#120e1a;
    --bg-panel:#1c1526;
    --lime:#d4ff3d;
    --pink:#ff3d7a;
    --gold:#ffd23d;
    --text:#f2eee8;
    --muted:#8f87a0;
    --line:#332a45;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 0%, rgba(212,255,61,0.10), transparent 45%),
      radial-gradient(circle at 85% 15%, rgba(255,61,122,0.14), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height:100vh;
    padding-bottom:120px;
  }
  header{
    padding:32px 20px 18px;
    text-align:center;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--pink);
    font-weight:700;
    margin-bottom:8px;
  }
  h1{
    margin:0;
    font-size:38px;
    font-weight:900;
    letter-spacing:0.02em;
    line-height:1;
    color:var(--lime);
    text-shadow:0 0 22px rgba(212,255,61,0.35);
  }
  .sub{
    margin-top:10px;
    color:var(--muted);
    font-size:14px;
  }
  .share-btn{
    margin-top:16px;
    background:none;
    border:1px solid var(--line);
    color:var(--lime);
    font-weight:700;
    font-size:13px;
    padding:9px 16px;
    border-radius:999px;
  }
  .share-btn:active{ border-color:var(--lime); }
  .location-box{
    max-width:440px;
    margin:14px auto 0;
    background:var(--bg-panel);
    border:1px solid rgba(212,255,61,0.35);
    border-radius:14px;
    padding:12px 16px;
    text-align:center;
  }
  .location-name{
    color:var(--lime);
    font-weight:800;
    font-size:15px;
  }
  .location-name::before{ content:"📍 "; }
  .location-desc{
    color:var(--muted);
    font-size:13px;
    margin-top:4px;
  }
  .location-link{
    color:var(--lime);
    text-decoration:underline;
    font-weight:700;
  }

  main{
    max-width:520px;
    margin:0 auto;
    padding:10px 16px;
  }

  .day-filter{
    display:flex;
    gap:8px;
    margin-bottom:14px;
    align-items:center;
  }
  .day-filter input[type="date"]{
    flex:1;
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:10px;
    color:var(--text);
    padding:10px 10px;
    font-size:14px;
    color-scheme: dark;
  }
  .day-filter input[type="date"]:focus{ outline:2px solid var(--lime); outline-offset:1px; }
  .day-clear-btn{
    background:none;
    border:1px solid var(--line);
    border-radius:10px;
    color:var(--muted);
    font-size:12px;
    font-weight:700;
    padding:10px 12px;
    white-space:nowrap;
  }
  .day-clear-btn.active{
    border-color:var(--lime);
    color:var(--lime);
  }
  .entry-time{
    font-size:11px;
    color:var(--muted);
    margin-top:2px;
  }

  .status{
    text-align:center;
    color:var(--muted);
    font-size:13px;
    padding:24px 0;
  }

  .entry{
    display:grid;
    grid-template-columns:38px 1fr auto auto;
    align-items:center;
    gap:12px;
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px 14px;
    margin-bottom:10px;
    position:relative;
    overflow:hidden;
  }
  .entry.rank-1{ border-color:rgba(255,210,61,0.6); box-shadow:0 0 24px rgba(255,210,61,0.15); }
  .entry.rank-2{ border-color:rgba(212,255,61,0.4); }
  .entry.rank-3{ border-color:rgba(255,61,122,0.35); }

  .rank{
    font-weight:900;
    font-size:18px;
    text-align:center;
    color:var(--muted);
  }
  .rank-1 .rank{ color:var(--gold); font-size:22px; }
  .rank-2 .rank{ color:var(--lime); }
  .rank-3 .rank{ color:var(--pink); }

  .name-col{
    min-width:0;
  }
  .name{
    font-weight:700;
    font-size:16px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .bar-track{
    height:5px;
    border-radius:3px;
    background:#0000;
    background-color:rgba(255,255,255,0.06);
    margin-top:6px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    border-radius:3px;
    background:linear-gradient(90deg, var(--lime), var(--pink));
  }

  .promille{
    font-weight:900;
    font-size:20px;
    color:var(--lime);
    white-space:nowrap;
  }
  .promille span{
    font-size:11px;
    color:var(--muted);
    font-weight:600;
    margin-left:2px;
  }

  .empty{
    text-align:center;
    color:var(--muted);
    padding:40px 20px;
    font-size:14px;
  }

  footer.controls{
    position:fixed;
    left:0; right:0; bottom:0;
    background:linear-gradient(180deg, rgba(18,14,26,0) 0%, var(--bg) 30%);
    padding:18px 16px 22px;
  }
  #entryForm{
    max-width:520px;
    margin:0 auto;
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px;
    display:grid;
    grid-template-columns:1fr 100px auto;
    gap:8px;
  }
  input{
    background:#140f1e;
    border:1px solid var(--line);
    border-radius:10px;
    color:var(--text);
    padding:12px 10px;
    font-size:15px;
    width:100%;
  }
  input::placeholder{ color:var(--muted); }
  input:focus{ outline:2px solid var(--lime); outline-offset:1px; }

  button{
    border:none;
    border-radius:10px;
    font-weight:800;
    font-size:15px;
    cursor:pointer;
  }
  .add-btn{
    background:var(--lime);
    color:#14100b;
    padding:0 16px;
  }
  .add-btn:active{ transform:scale(0.97); }
  .add-btn:disabled{ opacity:0.5; }

  .meta-row{
    max-width:520px;
    margin:6px auto 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:11px;
    color:var(--muted);
    padding:0 4px;
  }
  .reset-link{
    color:var(--muted);
    background:none;
    text-decoration:underline;
    font-size:11px;
    font-weight:600;
    padding:4px;
    margin-left:12px;
  }
  #settingsPanel{
    max-width:520px;
    margin:0 auto 8px;
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px;
    display:grid;
    gap:8px;
  }
  #settingsPanel input{
    background:#140f1e;
    border:1px solid var(--line);
    border-radius:10px;
    color:var(--text);
    padding:10px 10px;
    font-size:14px;
  }
  #settingsPanel .add-btn{
    padding:10px;
  }
  .delete-btn{
    background:none;
    border:none;
    color:var(--pink);
    font-size:16px;
    font-weight:900;
    padding:4px 8px;
    line-height:1;
    flex-shrink:0;
  }
  .delete-btn.armed{
    color:#ffffff;
    background:var(--pink);
    border-radius:6px;
  }
  #lockedBar{
    max-width:520px;
    margin:0 auto;
    text-align:center;
  }
  .unlock-btn{
    background:none;
    border:1px dashed var(--line);
    color:var(--muted);
    font-weight:600;
    font-size:12px;
    padding:10px 14px;
    border-radius:10px;
    width:100%;
  }
  .unlock-btn:active{ border-color:var(--lime); color:var(--lime); }
  #pinForm{
    display:grid;
    grid-template-columns:1fr 70px;
    gap:8px;
    margin-top:8px;
  }
  #pinForm .add-btn{ padding:0; }
  .error{
    color:var(--pink);
    font-size:12px;
    text-align:center;
    margin-top:6px;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Parookaville · Feldmessung</div>
  <h1 id="pageTitle">PROMILLE-BOARD</h1>
  <div class="sub" id="pageSub">Wer pustet am härtesten? Live-Bestenliste fürs ganze Camp.</div>
  <div id="locationBox" class="location-box" style="display:none;">
    <div id="locationName" class="location-name"></div>
    <div id="locationDesc" class="location-desc"></div>
  </div>
  <button type="button" id="shareBtn" class="share-btn">🔗 Liste teilen</button>
</header>

<main>
  <div class="day-filter" id="dayFilterBar">
    <input type="date" id="dayFilterInput" aria-label="Tag auswählen">
    <button type="button" id="dayFilterClear" class="day-clear-btn">Alle Tage</button>
  </div>
  <div id="list"></div>
</main>

<footer class="controls">
  <div id="lockedBar">
    <button type="button" class="unlock-btn" id="unlockBtn">🔒 Für Crew: Eintragen freischalten</button>
    <div id="pinForm" style="display:none;">
      <input id="pinInput" type="password" inputmode="numeric" placeholder="PIN" autocomplete="off">
      <button type="button" class="add-btn" id="pinSubmitBtn">OK</button>
    </div>
  </div>
  <div id="entryForm" style="display:none;">
    <input id="nameInput" type="text" placeholder="Name" maxlength="24">
    <input id="promilleInput" type="text" inputmode="decimal" placeholder="0,00 ‰">
    <button type="button" class="add-btn" id="submitBtn">+</button>
  </div>
  <div class="meta-row">
    <span id="countLabel">–</span>
    <div>
      <button type="button" class="reset-link" id="settingsBtn" style="display:none;">⚙️ Einstellungen</button>
      <button type="button" class="reset-link" id="resetBtn" style="display:none;">Liste leeren</button>
    </div>
  </div>
  <div id="settingsPanel" style="display:none;">
    <input id="settingsTitleInput" type="text" placeholder="Überschrift, z.B. PROMILLE-BOARD" maxlength="40">
    <input id="settingsSubInput" type="text" placeholder="Subline-Text" maxlength="100">
    <input id="settingsLocationInput" type="text" placeholder="Standort, z.B. Zone C · Platz 42" maxlength="60">
    <input id="settingsLocationDescInput" type="text" placeholder="Kurzbeschreibung, z.B. neben dem Bierwagen, gelbes Zelt" maxlength="120">
    <button type="button" class="add-btn" id="settingsSaveBtn">Speichern</button>
  </div>
  <div class="error" id="errorMsg"></div>
</footer>

<script>
  // PIN vor dem Festival ändern und nur an eure Crew geben
  const EDIT_PIN = "2910";
  const STORAGE_KEY = "leaderboard";
  // Eure Firebase Realtime Database URL (ohne "/leaderboard" o.ä. am Ende)
  const FIREBASE_URL = "https://parookaville-baf4d-default-rtdb.europe-west1.firebasedatabase.app";

  const listEl = document.getElementById('list');
  const form = document.getElementById('entryForm');
  const nameInput = document.getElementById('nameInput');
  const promilleInput = document.getElementById('promilleInput');
  const submitBtn = document.getElementById('submitBtn');
  const countLabel = document.getElementById('countLabel');
  const errorMsg = document.getElementById('errorMsg');
  const resetBtn = document.getElementById('resetBtn');
  const dayFilterInput = document.getElementById('dayFilterInput');
  const dayFilterClear = document.getElementById('dayFilterClear');
  const shareBtn = document.getElementById('shareBtn');
  const settingsBtn = document.getElementById('settingsBtn');
  const settingsPanel = document.getElementById('settingsPanel');
  const settingsTitleInput = document.getElementById('settingsTitleInput');
  const settingsSubInput = document.getElementById('settingsSubInput');
  const settingsLocationInput = document.getElementById('settingsLocationInput');
  const settingsLocationDescInput = document.getElementById('settingsLocationDescInput');
  const settingsSaveBtn = document.getElementById('settingsSaveBtn');
  const pageTitle = document.getElementById('pageTitle');
  const pageSub = document.getElementById('pageSub');
  const locationBox = document.getElementById('locationBox');
  const locationName = document.getElementById('locationName');
  const locationDesc = document.getElementById('locationDesc');
  const lockedBar = document.getElementById('lockedBar');
  const unlockBtn = document.getElementById('unlockBtn');
  const pinForm = document.getElementById('pinForm');
  const pinInput = document.getElementById('pinInput');
  const pinSubmitBtn = document.getElementById('pinSubmitBtn');

  let entries = [];
  let loaded = false;
  let unlocked = false;
  const storageAvailable = FIREBASE_URL !== "";

  unlockBtn.addEventListener('click', () => {
    unlockBtn.style.display = 'none';
    pinForm.style.display = 'grid';
    pinInput.focus();
  });

  function checkPin(){
    if(pinInput.value.trim() === EDIT_PIN){
      unlocked = true;
      lockedBar.style.display = 'none';
      form.style.display = 'grid';
      resetBtn.style.display = 'inline';
      settingsBtn.style.display = 'inline';
      nameInput.focus();
      render();
    }else{
      showError("Falscher PIN.");
      pinInput.value = '';
      pinInput.focus();
    }
  }
  pinSubmitBtn.addEventListener('click', checkPin);
  pinInput.addEventListener('keydown', (ev) => {
    if(ev.key === 'Enter'){ ev.preventDefault(); checkPin(); }
  });

  function showError(msg){
    errorMsg.textContent = msg;
    if(msg) setTimeout(() => { if(errorMsg.textContent === msg) errorMsg.textContent = ""; }, 9000);
  }

  function showSetupScreen(){
    const box = document.createElement('div');
    box.className = 'status';
    box.style.color = 'var(--text)';
    box.style.padding = '20px 16px';
    box.style.textAlign = 'left';
    box.innerHTML = `
      <div style="font-weight:800; color:var(--lime); margin-bottom:8px;">Kein Speicher eingerichtet</div>
      <div>Es fehlt die FIREBASE_URL im Code. Bitte an Claude schicken, damit sie eingebaut wird.</div>
    `;
    listEl.parentNode.insertBefore(box, listEl);
  }

  async function loadEntries(){
    if(!storageAvailable){
      loaded = true;
      render();
      return;
    }
    try{
      const res = await fetch(`${FIREBASE_URL}/${STORAGE_KEY}.json?t=${Date.now()}`);
      if(res.ok){
        const data = await res.json();
        entries = Array.isArray(data) ? data : (data ? Object.values(data) : []);
      }
    }catch(e){
      // Netzwerkfehler: alten Stand behalten, kein Absturz
    }
    loaded = true;
    render();
  }

  async function saveEntries(){
    if(!storageAvailable){ showError("Kein Speicher eingerichtet (Setup fehlt)."); return false; }
    try{
      const res = await fetch(`${FIREBASE_URL}/${STORAGE_KEY}.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(entries)
      });
      if(!res.ok){
        let detail = '';
        try{ detail = await res.text(); }catch(e2){}
        showError("Speichern fehlgeschlagen (Status " + res.status + (detail ? ": " + detail.slice(0,150) : "") + ")");
        return false;
      }
      return true;
    }catch(e){
      showError("Verbindung zum Speicher verloren: " + (e && e.message ? e.message : "unbekannter Fehler"));
      return false;
    }
  }

  function linkifyText(str){
    const escaped = escapeHtml(str);
    const urlPattern = /(https?:\/\/[^\s]+)/g;
    return escaped.replace(urlPattern, (url) => {
      // Satzzeichen am Ende (. , ) etc.) nicht mit in den Link ziehen
      const trailingMatch = url.match(/[.,!?)]+$/);
      const trailing = trailingMatch ? trailingMatch[0] : '';
      const cleanUrl = trailing ? url.slice(0, -trailing.length) : url;
      return `<a href="${cleanUrl}" target="_blank" rel="noopener noreferrer" class="location-link">Link öffnen</a>${trailing}`;
    });
  }

  function applyLocationDisplay(location, description){
    if(location){
      locationName.innerHTML = linkifyText(location);
      locationDesc.innerHTML = description ? linkifyText(description) : '';
      locationBox.style.display = 'block';
    }else{
      locationBox.style.display = 'none';
    }
  }

  async function loadSettings(){
    if(!storageAvailable) return;
    try{
      const res = await fetch(`${FIREBASE_URL}/pageSettings.json?t=${Date.now()}`);
      if(res.ok){
        const data = await res.json();
        if(data && data.title){ pageTitle.textContent = data.title; }
        if(data && data.subtitle){ pageSub.textContent = data.subtitle; }
        applyLocationDisplay(data && data.location, data && data.locationDesc);
      }
    }catch(e){
      // Netzwerkfehler: Standardtexte behalten
    }
  }

  async function saveSettings(title, subtitle, location, locationDesc){
    if(!storageAvailable){ showError("Kein Speicher eingerichtet."); return false; }
    try{
      const res = await fetch(`${FIREBASE_URL}/pageSettings.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, subtitle, location, locationDesc })
      });
      if(!res.ok){
        showError("Speichern der Einstellungen fehlgeschlagen (Status " + res.status + ")");
        return false;
      }
      return true;
    }catch(e){
      showError("Verbindung zum Speicher verloren.");
      return false;
    }
  }

  settingsBtn.addEventListener('click', () => {
    const showing = settingsPanel.style.display !== 'none';
    if(showing){
      settingsPanel.style.display = 'none';
    }else{
      settingsTitleInput.value = pageTitle.textContent;
      settingsSubInput.value = pageSub.textContent;
      settingsLocationInput.value = locationName.textContent;
      settingsLocationDescInput.value = locationDesc.textContent;
      settingsPanel.style.display = 'grid';
    }
  });

  settingsSaveBtn.addEventListener('click', async () => {
    const title = settingsTitleInput.value.trim();
    const subtitle = settingsSubInput.value.trim();
    const location = settingsLocationInput.value.trim();
    const locDesc = settingsLocationDescInput.value.trim();
    if(!title){ showError("Überschrift darf nicht leer sein."); return; }
    settingsSaveBtn.disabled = true;
    const ok = await saveSettings(title, subtitle, location, locDesc);
    if(ok){
      pageTitle.textContent = title;
      pageSub.textContent = subtitle;
      applyLocationDisplay(location, locDesc);
      settingsPanel.style.display = 'none';
    }
    settingsSaveBtn.disabled = false;
  });

  function toLocalDateStr(ts){
    const d = new Date(ts);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
  }

  function formatEntryTime(ts){
    const d = new Date(ts);
    const weekday = d.toLocaleDateString('de-DE', { weekday: 'short' });
    const time = d.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    return `${weekday} ${time}`;
  }

  function render(){
    if(!loaded){
      listEl.innerHTML = '<div class="status">Lade Bestenliste …</div>';
      return;
    }
    const activeDay = dayFilterInput.value;
    const filtered = activeDay ? entries.filter(e => toLocalDateStr(e.ts) === activeDay) : entries;
    const sorted = [...filtered].sort((a,b) => b.promille - a.promille);
    countLabel.textContent = sorted.length + (sorted.length === 1 ? " Eintrag" : " Einträge")
      + (activeDay ? " · gefiltert" : "");

    if(sorted.length === 0){
      listEl.innerHTML = activeDay
        ? '<div class="empty">An diesem Tag noch keine Einträge.</div>'
        : '<div class="empty">Noch keiner hat gepustet.<br>Sei der / die Erste.</div>';
      return;
    }

    const max = Math.max(...sorted.map(e => e.promille), 0.1);
    listEl.innerHTML = sorted.map((e, i) => {
      const rank = i + 1;
      const rankClass = rank <= 3 ? "rank-" + rank : "";
      const pct = Math.min(100, (e.promille / max) * 100);
      const medal = rank === 1 ? "🥇" : rank === 2 ? "🥈" : rank === 3 ? "🥉" : rank;
      const deleteBtn = unlocked
        ? `<button type="button" class="delete-btn" data-ts="${e.ts}" title="Eintrag löschen">✕</button>`
        : '';
      return `
        <div class="entry ${rankClass}">
          <div class="rank">${medal}</div>
          <div class="name-col">
            <div class="name">${escapeHtml(e.name)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="entry-time">${e.ts ? formatEntryTime(e.ts) : ''}</div>
          </div>
          <div class="promille">${e.promille.toFixed(2)}<span>‰</span></div>
          ${deleteBtn}
        </div>`;
    }).join('');
  }

  let deleteArmedTs = null;
  listEl.addEventListener('click', async (ev) => {
    const btn = ev.target.closest('.delete-btn');
    if(!btn) return;
    const ts = btn.getAttribute('data-ts');
    if(deleteArmedTs !== ts){
      deleteArmedTs = ts;
      btn.classList.add('armed');
      btn.textContent = '✓';
      setTimeout(() => { if(deleteArmedTs === ts){ deleteArmedTs = null; render(); } }, 3500);
      return;
    }
    deleteArmedTs = null;
    btn.disabled = true;
    try{
      if(storageAvailable){
        const res = await fetch(`${FIREBASE_URL}/${STORAGE_KEY}.json?t=${Date.now()}`).catch(() => null);
        if(res && res.ok){
          const data = await res.json();
          entries = Array.isArray(data) ? data : (data ? Object.values(data) : entries);
        }
      }
      entries = entries.filter(e => String(e.ts) !== ts);
      await saveEntries();
      render();
    }catch(e){
      showError("Löschen hat nicht geklappt.");
    }
  });

  dayFilterInput.addEventListener('change', () => {
    dayFilterClear.classList.toggle('active', dayFilterInput.value !== '');
    render();
  });
  dayFilterClear.addEventListener('click', () => {
    dayFilterInput.value = '';
    dayFilterClear.classList.remove('active');
    render();
  });

  shareBtn.addEventListener('click', async () => {
    const shareData = {
      title: 'Parookaville Promille-Board',
      text: 'Wer pustet am härtesten? Live-Bestenliste checken 🍻',
      url: window.location.href
    };
    try{
      if(navigator.share){
        await navigator.share(shareData);
      }else if(navigator.clipboard){
        await navigator.clipboard.writeText(shareData.url);
        showError("Link kopiert!");
      }else{
        showError(shareData.url);
      }
    }catch(e){
      // Nutzer hat den Share-Dialog abgebrochen o.ä. — kein Fehler nötig
    }
  });

  function fireConfetti(){
    const colors = ['#d4ff3d', '#ff3d7a', '#ffd23d', '#ffffff'];
    const count = 60;
    for(let i = 0; i < count; i++){
      const piece = document.createElement('div');
      const size = 6 + Math.random() * 6;
      piece.style.position = 'fixed';
      piece.style.left = (Math.random() * 100) + 'vw';
      piece.style.top = '-20px';
      piece.style.width = size + 'px';
      piece.style.height = (size * 0.4) + 'px';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.opacity = '0.9';
      piece.style.borderRadius = '2px';
      piece.style.zIndex = '9999';
      piece.style.pointerEvents = 'none';
      const duration = 1800 + Math.random() * 1400;
      const rotation = (Math.random() > 0.5 ? 1 : -1) * (360 + Math.random() * 720);
      const drift = (Math.random() - 0.5) * 200;
      piece.style.transition = `transform ${duration}ms cubic-bezier(.25,.46,.45,.94), opacity ${duration}ms ease-out`;
      document.body.appendChild(piece);
      requestAnimationFrame(() => {
        piece.style.transform = `translate(${drift}px, 110vh) rotate(${rotation}deg)`;
        piece.style.opacity = '0';
      });
      setTimeout(() => piece.remove(), duration + 100);
    }
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  async function addEntry(){
    const name = nameInput.value.trim();
    const raw = promilleInput.value.trim().replace(',', '.');
    const promille = parseFloat(raw);

    if(!name){ showError("Name fehlt."); nameInput.focus(); return; }
    if(promilleInput.value.trim() === '' || isNaN(promille)){ showError("Promillewert fehlt."); promilleInput.focus(); return; }
    if(promille < 0 || promille > 5){ showError("Promillewert prüfen (0–5)."); promilleInput.focus(); return; }

    submitBtn.disabled = true;
    try{
      if(storageAvailable){
        // frischesten Stand holen, bevor wir schreiben (mehrere Handys im Einsatz)
        const res = await fetch(`${FIREBASE_URL}/${STORAGE_KEY}.json?t=${Date.now()}`).catch(() => null);
        if(res && res.ok){
          const data = await res.json();
          entries = Array.isArray(data) ? data : (data ? Object.values(data) : entries);
        }
      }
      const previousMax = entries.reduce((m, e) => Math.max(m, e.promille), 0);
      entries.push({ name, promille, ts: Date.now() });
      const ok = await saveEntries();
      if(ok !== false){
        render();
        if(promille > previousMax){ fireConfetti(); }
        nameInput.value = '';
        promilleInput.value = '';
        nameInput.focus();
      }
    }catch(e){
      showError((e && e.message) ? e.message : "Eintragen hat nicht geklappt.");
    }
    submitBtn.disabled = false;
  }
  submitBtn.addEventListener('click', addEntry);
  promilleInput.addEventListener('keydown', (ev) => {
    if(ev.key === 'Enter'){ ev.preventDefault(); addEntry(); }
  });
  nameInput.addEventListener('keydown', (ev) => {
    if(ev.key === 'Enter'){ ev.preventDefault(); promilleInput.focus(); }
  });

  let resetArmed = false;
  resetBtn.addEventListener('click', async () => {
    if(!resetArmed){
      resetArmed = true;
      resetBtn.textContent = "Wirklich? Nochmal tippen";
      setTimeout(() => {
        if(resetArmed){ resetArmed = false; resetBtn.textContent = "Liste leeren"; }
      }, 4000);
      return;
    }
    resetArmed = false;
    resetBtn.textContent = "Liste leeren";
    entries = [];
    await saveEntries();
    render();
  });

  // alle paar Sekunden neu laden, damit Einträge von anderen Handys auftauchen (Lesen geht immer, auch ohne Token)
  loadSettings();
  loadEntries().then(() => { if(!storageAvailable) showSetupScreen(); });
  setInterval(loadEntries, 5000);
</script>

</body>
</html>
