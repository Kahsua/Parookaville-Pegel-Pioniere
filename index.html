<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Parookaville · Promille-Bestenliste</title>
<style>
  :root{
    --bg:#120e1a;
    --bg-panel:#1c1526;
    --lime:#d4ff3d;
    --pink:#ff3d7a;
    --gold:#ffd23d;
    --text:#f2eee8;
    --muted:#8f87a0;
    --line:#332a45;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(circle at 15% 0%, rgba(212,255,61,0.10), transparent 45%),
      radial-gradient(circle at 85% 15%, rgba(255,61,122,0.14), transparent 45%),
      var(--bg);
    color:var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height:100vh;
    padding-bottom:120px;
  }
  header{
    padding:32px 20px 18px;
    text-align:center;
  }
  .eyebrow{
    font-size:12px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--pink);
    font-weight:700;
    margin-bottom:8px;
  }
  h1{
    margin:0;
    font-size:38px;
    font-weight:900;
    letter-spacing:0.02em;
    line-height:1;
    color:var(--lime);
    text-shadow:0 0 22px rgba(212,255,61,0.35);
  }
  .sub{
    margin-top:10px;
    color:var(--muted);
    font-size:14px;
  }

  main{
    max-width:520px;
    margin:0 auto;
    padding:10px 16px;
  }

  .status{
    text-align:center;
    color:var(--muted);
    font-size:13px;
    padding:24px 0;
  }

  .entry{
    display:grid;
    grid-template-columns:38px 1fr auto;
    align-items:center;
    gap:12px;
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:12px 14px;
    margin-bottom:10px;
    position:relative;
    overflow:hidden;
  }
  .entry.rank-1{ border-color:rgba(255,210,61,0.6); box-shadow:0 0 24px rgba(255,210,61,0.15); }
  .entry.rank-2{ border-color:rgba(212,255,61,0.4); }
  .entry.rank-3{ border-color:rgba(255,61,122,0.35); }

  .rank{
    font-weight:900;
    font-size:18px;
    text-align:center;
    color:var(--muted);
  }
  .rank-1 .rank{ color:var(--gold); font-size:22px; }
  .rank-2 .rank{ color:var(--lime); }
  .rank-3 .rank{ color:var(--pink); }

  .name-col{
    min-width:0;
  }
  .name{
    font-weight:700;
    font-size:16px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .bar-track{
    height:5px;
    border-radius:3px;
    background:#0000;
    background-color:rgba(255,255,255,0.06);
    margin-top:6px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    border-radius:3px;
    background:linear-gradient(90deg, var(--lime), var(--pink));
  }

  .promille{
    font-weight:900;
    font-size:20px;
    color:var(--lime);
    white-space:nowrap;
  }
  .promille span{
    font-size:11px;
    color:var(--muted);
    font-weight:600;
    margin-left:2px;
  }

  .empty{
    text-align:center;
    color:var(--muted);
    padding:40px 20px;
    font-size:14px;
  }

  footer.controls{
    position:fixed;
    left:0; right:0; bottom:0;
    background:linear-gradient(180deg, rgba(18,14,26,0) 0%, var(--bg) 30%);
    padding:18px 16px 22px;
  }
  #entryForm{
    max-width:520px;
    margin:0 auto;
    background:var(--bg-panel);
    border:1px solid var(--line);
    border-radius:16px;
    padding:14px;
    display:grid;
    grid-template-columns:1fr 100px auto;
    gap:8px;
  }
  input{
    background:#140f1e;
    border:1px solid var(--line);
    border-radius:10px;
    color:var(--text);
    padding:12px 10px;
    font-size:15px;
    width:100%;
  }
  input::placeholder{ color:var(--muted); }
  input:focus{ outline:2px solid var(--lime); outline-offset:1px; }

  button{
    border:none;
    border-radius:10px;
    font-weight:800;
    font-size:15px;
    cursor:pointer;
  }
  .add-btn{
    background:var(--lime);
    color:#14100b;
    padding:0 16px;
  }
  .add-btn:active{ transform:scale(0.97); }
  .add-btn:disabled{ opacity:0.5; }

  .meta-row{
    max-width:520px;
    margin:6px auto 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:11px;
    color:var(--muted);
    padding:0 4px;
  }
  .reset-link{
    color:var(--muted);
    background:none;
    text-decoration:underline;
    font-size:11px;
    font-weight:600;
    padding:4px;
  }
  #lockedBar{
    max-width:520px;
    margin:0 auto;
    text-align:center;
  }
  .unlock-btn{
    background:none;
    border:1px dashed var(--line);
    color:var(--muted);
    font-weight:600;
    font-size:12px;
    padding:10px 14px;
    border-radius:10px;
    width:100%;
  }
  .unlock-btn:active{ border-color:var(--lime); color:var(--lime); }
  #pinForm{
    display:grid;
    grid-template-columns:1fr 70px;
    gap:8px;
    margin-top:8px;
  }
  #pinForm .add-btn{ padding:0; }
  .error{
    color:var(--pink);
    font-size:12px;
    text-align:center;
    margin-top:6px;
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">Parookaville · Feldmessung</div>
  <h1>PROMILLE-BOARD</h1>
  <div class="sub">Wer pustet am härtesten? Live-Bestenliste fürs ganze Camp.</div>
</header>

<main>
  <div id="list"></div>
</main>

<footer class="controls">
  <div id="lockedBar">
    <button type="button" class="unlock-btn" id="unlockBtn">🔒 Für Crew: Eintragen freischalten</button>
    <div id="pinForm" style="display:none;">
      <input id="pinInput" type="password" inputmode="numeric" placeholder="PIN" autocomplete="off">
      <button type="button" class="add-btn" id="pinSubmitBtn">OK</button>
    </div>
  </div>
  <div id="entryForm" style="display:none;">
    <input id="nameInput" type="text" placeholder="Name" maxlength="24">
    <input id="promilleInput" type="text" inputmode="decimal" placeholder="0,00 ‰">
    <button type="button" class="add-btn" id="submitBtn">+</button>
  </div>
  <div class="meta-row">
    <span id="countLabel">–</span>
    <button type="button" class="reset-link" id="resetBtn" style="display:none;">Liste leeren</button>
  </div>
  <div class="error" id="errorMsg"></div>
</footer>

<script>
  // PIN vor dem Festival ändern und nur an eure Crew geben
  const EDIT_PIN = "2026";
  // Euer GitHub-Repo, in dem die Daten als leaderboard.json abgelegt werden
  const GH_OWNER = "kahsua";
  const GH_REPO = "Parookaville-Pegel-Pioniere";
  const GH_BRANCH = "main";
  const GH_PATH = "leaderboard.json";
  // Fine-grained Personal Access Token mit "Contents: Read and write" NUR für dieses Repo.
  // Erstellen unter: https://github.com/settings/tokens?type=beta
  const GH_TOKEN = "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";

  const listEl = document.getElementById('list');
  const form = document.getElementById('entryForm');
  const nameInput = document.getElementById('nameInput');
  const promilleInput = document.getElementById('promilleInput');
  const submitBtn = document.getElementById('submitBtn');
  const countLabel = document.getElementById('countLabel');
  const errorMsg = document.getElementById('errorMsg');
  const resetBtn = document.getElementById('resetBtn');
  const lockedBar = document.getElementById('lockedBar');
  const unlockBtn = document.getElementById('unlockBtn');
  const pinForm = document.getElementById('pinForm');
  const pinInput = document.getElementById('pinInput');
  const pinSubmitBtn = document.getElementById('pinSubmitBtn');

  let entries = [];
  let loaded = false;
  let unlocked = false;
  let currentSha = null;
  const storageAvailable = GH_TOKEN !== "";

  unlockBtn.addEventListener('click', () => {
    unlockBtn.style.display = 'none';
    pinForm.style.display = 'grid';
    pinInput.focus();
  });

  function checkPin(){
    if(pinInput.value.trim() === EDIT_PIN){
      unlocked = true;
      lockedBar.style.display = 'none';
      form.style.display = 'grid';
      resetBtn.style.display = 'inline';
      nameInput.focus();
    }else{
      showError("Falscher PIN.");
      pinInput.value = '';
      pinInput.focus();
    }
  }
  pinSubmitBtn.addEventListener('click', checkPin);
  pinInput.addEventListener('keydown', (ev) => {
    if(ev.key === 'Enter'){ ev.preventDefault(); checkPin(); }
  });

  function showError(msg){
    errorMsg.textContent = msg;
    if(msg) setTimeout(() => { if(errorMsg.textContent === msg) errorMsg.textContent = ""; }, 9000);
  }

  function showSetupScreen(){
    const box = document.createElement('div');
    box.className = 'status';
    box.style.color = 'var(--text)';
    box.style.padding = '20px 16px';
    box.style.textAlign = 'left';
    box.innerHTML = `
      <div style="font-weight:800; color:var(--lime); margin-bottom:8px;">Einmaliges Setup nötig</div>
      <div style="margin-bottom:6px;">Es fehlt noch der Schreib-Zugriff aufs Repo. So geht's (einmalig, ca. 2 Minuten):</div>
      <ol style="margin:0 0 10px 18px; padding:0; color:var(--muted); font-size:13px; line-height:1.6;">
        <li>Auf github.com einloggen, dann zu
          <span style="color:var(--lime);">github.com/settings/tokens?type=beta</span> gehen.</li>
        <li>"Generate new token" klicken.</li>
        <li>Bei "Repository access" → "Only select repositories" → euer Repo
          <b>${GH_REPO}</b> auswählen.</li>
        <li>Bei "Permissions" → "Repository permissions" → "Contents" auf
          <b>"Read and write"</b> stellen.</li>
        <li>Token generieren, den Code (beginnt mit <code>github_pat_...</code>) kopieren.</li>
        <li>Diesen Token an Claude schicken, damit er fest in die Seite eingebaut wird
          (oder direkt selbst in Zeile <code>GH_TOKEN</code> der index.html eintragen und neu hochladen).</li>
      </ol>
      <div style="font-size:12px; color:var(--muted);">Der Token erlaubt nur Schreibzugriff auf genau dieses eine Repo –
      nach dem Festival könnt ihr ihn unter github.com/settings/tokens wieder löschen.</div>
    `;
    listEl.parentNode.insertBefore(box, listEl);
  }

  function b64EncodeUnicode(str){
    return btoa(unescape(encodeURIComponent(str)));
  }
  function b64DecodeUnicode(str){
    return decodeURIComponent(escape(atob(str.replace(/\n/g, ''))));
  }

  async function ghGetFile(){
    const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}?ref=${GH_BRANCH}`;
    const res = await fetch(url, {
      headers: {
        'Authorization': 'token ' + GH_TOKEN,
        'Accept': 'application/vnd.github+json'
      }
    });
    if(res.status === 404){ currentSha = null; return []; }
    if(!res.ok){
      let detail = '';
      try{ detail = (await res.json()).message || ''; }catch(e2){}
      throw new Error('Lesen fehlgeschlagen (Status ' + res.status + (detail ? ': ' + detail : '') + ')');
    }
    const data = await res.json();
    currentSha = data.sha;
    return data.content ? JSON.parse(b64DecodeUnicode(data.content)) : [];
  }

  async function loadEntries(){
    try{
      const url = `https://raw.githubusercontent.com/${GH_OWNER}/${GH_REPO}/${GH_BRANCH}/${GH_PATH}?t=${Date.now()}`;
      const res = await fetch(url);
      if(res.status === 404){
        entries = [];
      }else if(res.ok){
        const text = await res.text();
        entries = text ? JSON.parse(text) : [];
      }
    }catch(e){
      // Netzwerkfehler: alten Stand behalten, kein Absturz
    }
    loaded = true;
    render();
  }

  async function saveEntries(){
    if(!storageAvailable){ showError("Kein Schreibzugriff eingerichtet (Setup fehlt)."); return false; }
    try{
      const url = `https://api.github.com/repos/${GH_OWNER}/${GH_REPO}/contents/${GH_PATH}`;
      const body = {
        message: 'Bestenliste aktualisiert',
        content: b64EncodeUnicode(JSON.stringify(entries)),
        branch: GH_BRANCH
      };
      if(currentSha) body.sha = currentSha;
      const res = await fetch(url, {
        method: 'PUT',
        headers: {
          'Authorization': 'token ' + GH_TOKEN,
          'Accept': 'application/vnd.github+json',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(body)
      });
      if(!res.ok){
        let detail = '';
        try{ detail = (await res.json()).message || ''; }catch(e2){}
        showError("Speichern fehlgeschlagen (Status " + res.status + (detail ? ": " + detail : "") + ")");
        return false;
      }
      const data = await res.json();
      currentSha = data.content.sha;
      return true;
    }catch(e){
      showError("Verbindung zu GitHub verloren: " + (e && e.message ? e.message : "unbekannter Fehler"));
      return false;
    }
  }

  function render(){
    if(!loaded){
      listEl.innerHTML = '<div class="status">Lade Bestenliste …</div>';
      return;
    }
    const sorted = [...entries].sort((a,b) => b.promille - a.promille);
    countLabel.textContent = sorted.length + (sorted.length === 1 ? " Eintrag" : " Einträge");

    if(sorted.length === 0){
      listEl.innerHTML = '<div class="empty">Noch keiner hat gepustet.<br>Sei der / die Erste.</div>';
      return;
    }

    const max = Math.max(...sorted.map(e => e.promille), 0.1);
    listEl.innerHTML = sorted.map((e, i) => {
      const rank = i + 1;
      const rankClass = rank <= 3 ? "rank-" + rank : "";
      const pct = Math.min(100, (e.promille / max) * 100);
      const medal = rank === 1 ? "🥇" : rank === 2 ? "🥈" : rank === 3 ? "🥉" : rank;
      return `
        <div class="entry ${rankClass}">
          <div class="rank">${medal}</div>
          <div class="name-col">
            <div class="name">${escapeHtml(e.name)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
          </div>
          <div class="promille">${e.promille.toFixed(2)}<span>‰</span></div>
        </div>`;
    }).join('');
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  async function addEntry(){
    const name = nameInput.value.trim();
    const raw = promilleInput.value.trim().replace(',', '.');
    const promille = parseFloat(raw);

    if(!name){ showError("Name fehlt."); nameInput.focus(); return; }
    if(promilleInput.value.trim() === '' || isNaN(promille)){ showError("Promillewert fehlt."); promilleInput.focus(); return; }
    if(promille < 0 || promille > 5){ showError("Promillewert prüfen (0–5)."); promilleInput.focus(); return; }

    submitBtn.disabled = true;
    try{
      // frischesten Stand + sha holen, bevor wir schreiben (mehrere Handys im Einsatz)
      entries = await ghGetFile();
      entries.push({ name, promille, ts: Date.now() });
      const ok = await saveEntries();
      if(ok !== false){
        render();
        nameInput.value = '';
        promilleInput.value = '';
        nameInput.focus();
      }
    }catch(e){
      showError((e && e.message) ? e.message : "Eintragen hat nicht geklappt.");
    }
    submitBtn.disabled = false;
  }
  submitBtn.addEventListener('click', addEntry);
  promilleInput.addEventListener('keydown', (ev) => {
    if(ev.key === 'Enter'){ ev.preventDefault(); addEntry(); }
  });
  nameInput.addEventListener('keydown', (ev) => {
    if(ev.key === 'Enter'){ ev.preventDefault(); promilleInput.focus(); }
  });

  let resetArmed = false;
  resetBtn.addEventListener('click', async () => {
    if(!resetArmed){
      resetArmed = true;
      resetBtn.textContent = "Wirklich? Nochmal tippen";
      setTimeout(() => {
        if(resetArmed){ resetArmed = false; resetBtn.textContent = "Liste leeren"; }
      }, 4000);
      return;
    }
    resetArmed = false;
    resetBtn.textContent = "Liste leeren";
    try{ await ghGetFile(); }catch(e){}
    entries = [];
    await saveEntries();
    render();
  });

  // alle paar Sekunden neu laden, damit Einträge von anderen Handys auftauchen (Lesen geht immer, auch ohne Token)
  loadEntries().then(() => { if(!storageAvailable) showSetupScreen(); });
  setInterval(loadEntries, 5000);
</script>

</body>
</html>
